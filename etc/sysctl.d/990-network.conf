# Current: https://docs.kernel.org/networking/ip-sysctl.html
# Ancient: https://www.frozentux.net/ipsysctl-tutorial/ipsysctl-tutorial.html


# Disable IP forwarding
# Reset all configuration parameters to host mode
net.ipv4.ip_forward = 0

# Disable IPv6
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1


# Ignore broadcast ICMP Echo Requests
# Prevent participation in Smurf attacks
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Log bogus responses to broadcast ICMP frames
net.ipv4.icmp_ignore_bogus_error_responses = 0


# Enable performant TCP congestion control algorithm
# Requires pacing, can be used with the default fq_codel since 4.13 (218af59)
net.core.default_qdisc = fq_codel
net.ipv4.tcp_congestion_control = bbr

# Enable Explicit Congestion Notification for incoming and outgoing connections
net.ipv4.tcp_ecn = 1

# Enable Path MTU Discovery when an ICMP black hole is detected
# https://blog.cloudflare.com/path-mtu-discovery-in-practice/
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_base_mss = 1024

# Ignore RST packets sent to sockets in the TIME-WAIT state
# Prevent old duplicate packets from interfering with new connections
net.ipv4.tcp_rfc1337 = 1

# Disable time out of the congestion window after an idle period
# Improve performance of persistent and fixed-bandwidth connections
net.ipv4.tcp_slow_start_after_idle = 0

# Prevent SYN flood attacks
net.ipv4.tcp_syncookies = 1


# Log martian (with impossible addresses) packets
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Disable incoming and outgoing ICMP Redirects
# Prevent external meddling with local routing info
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Ignore source-based routing
# Prevent external meddling with local routing info
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Enable strict source address validation
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Prevent ARP flux
net.ipv4.conf.all.arp_announce = 1
net.ipv4.conf.all.arp_ignore = 2
net.ipv4.conf.default.arp_announce = 1
net.ipv4.conf.default.arp_ignore = 2
